<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Share2Forget</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f8cff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='18' cy='5' r='3'/%3E%3Ccircle cx='6' cy='12' r='3'/%3E%3Ccircle cx='18' cy='19' r='3'/%3E%3Cline x1='8.59' y1='13.51' x2='15.42' y2='17.49'/%3E%3Cline x1='15.41' y1='6.51' x2='8.59' y2='10.49'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Icon-Sprite (Feather Icons, MIT) -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
    <symbol id="i-share" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></symbol>
    <symbol id="i-plus" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></symbol>
    <symbol id="i-login" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></symbol>
    <symbol id="i-back" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></symbol>
    <symbol id="i-copy" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></symbol>
    <symbol id="i-trash" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></symbol>
    <symbol id="i-lock" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></symbol>
    <symbol id="i-paperclip" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></symbol>
    <symbol id="i-file" viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></symbol>
    <symbol id="i-upload" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></symbol>
    <symbol id="i-download" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></symbol>
    <symbol id="i-users" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></symbol>
    <symbol id="i-send" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></symbol>
    <symbol id="i-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></symbol>
    <symbol id="i-bold" viewBox="0 0 24 24"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></symbol>
    <symbol id="i-italic" viewBox="0 0 24 24"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></symbol>
    <symbol id="i-underline" viewBox="0 0 24 24"><path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"/><line x1="4" y1="21" x2="20" y2="21"/></symbol>
    <symbol id="i-strike" viewBox="0 0 24 24"><path d="M17.3 5.3A6.5 6.5 0 0 0 12 3.5c-2.8 0-5 1.6-5 3.8 0 1.2.6 2.1 1.7 2.7"/><path d="M6.6 18.6a6.9 6.9 0 0 0 5.4 1.9c2.9 0 5-1.6 5-3.9 0-1.1-.5-2-1.5-2.6"/><line x1="4" y1="12" x2="20" y2="12"/></symbol>
    <symbol id="i-code" viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></symbol>
    <symbol id="i-code-block" viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></symbol>
    <symbol id="i-quote" viewBox="0 0 24 24"><path d="M10 11H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v6a4 4 0 0 1-4 4"/><path d="M20 11h-4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v6a4 4 0 0 1-4 4"/></symbol>
    <symbol id="i-list-ul" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></symbol>
    <symbol id="i-list-ol" viewBox="0 0 24 24"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-1.5 2-3 0-.8-.7-1.2-1.5-1S3.5 15 3.5 15"/></symbol>
    <symbol id="i-link" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></symbol>
    <symbol id="i-clear-format" viewBox="0 0 24 24"><polyline points="7 7 7 4 20 4 20 7"/><line x1="10" y1="20" x2="16" y2="20"/><line x1="13.5" y1="4" x2="10" y2="20"/><line x1="3" y1="21" x2="19" y2="5"/></symbol>
  </svg>

  <header class="topbar">
    <div class="brand"><svg class="icon"><use href="#i-share"/></svg><span>Share<em>2</em>Forget</span></div>
    <input id="username" class="name-input" maxlength="24" placeholder="Dein Name" title="Dein Anzeigename in Channels">
  </header>

  <main id="view-home">
    <section class="cards">
      <div class="card">
        <h2><svg class="icon"><use href="#i-plus"/></svg>Channel erstellen</h2>
        <p class="hint">Der 5-stellige Code wird automatisch erzeugt.</p>
        <form id="create-form">
          <input id="create-password" type="password" placeholder="Passwort (optional)" autocomplete="new-password">
          <button type="submit" class="btn primary">Erstellen</button>
        </form>
      </div>
      <div class="card">
        <h2><svg class="icon"><use href="#i-login"/></svg>Channel beitreten</h2>
        <p class="hint">5-stelliger Code – Groß-/Kleinschreibung zählt.</p>
        <form id="join-form">
          <input id="join-code" class="code-input" maxlength="5" placeholder="Code (5 Zeichen)" autocomplete="off" spellcheck="false">
          <button type="submit" class="btn primary">Beitreten</button>
        </form>
      </div>
    </section>

    <section class="list-section">
      <h2>Aktive Channels</h2>
      <ul id="channel-list" class="channel-list"></ul>
      <p id="no-channels" class="hint">Noch keine Channels – erstelle den ersten!</p>
    </section>
  </main>

  <main id="view-channel" hidden>
    <div class="channel-header">
      <button id="btn-leave" class="btn ghost icon-btn" title="Zurück zur Übersicht"><svg class="icon"><use href="#i-back"/></svg></button>
      <span id="channel-code" class="channel-code">·····</span>
      <button id="btn-copy" class="btn ghost icon-btn" title="Code kopieren"><svg class="icon"><use href="#i-copy"/></svg></button>
      <span class="users-badge" title="Verbundene Geräte"><svg class="icon"><use href="#i-users"/></svg><span id="channel-users">–</span></span>
      <span class="spacer"></span>
      <button id="btn-delete" class="btn danger"><svg class="icon"><use href="#i-trash"/></svg>Löschen</button>
    </div>

    <div id="messages" class="messages"></div>

    <form id="send-form" class="send-bar">
      <div id="toolbar" class="toolbar">
        <button type="button" class="tb" data-cmd="bold" title="Fett (Strg+B)"><svg class="icon"><use href="#i-bold"/></svg></button>
        <button type="button" class="tb" data-cmd="italic" title="Kursiv (Strg+I)"><svg class="icon"><use href="#i-italic"/></svg></button>
        <button type="button" class="tb" data-cmd="underline" title="Unterstrichen (Strg+U)"><svg class="icon"><use href="#i-underline"/></svg></button>
        <button type="button" class="tb" data-cmd="strikeThrough" title="Durchgestrichen (Strg+Umschalt+X)"><svg class="icon"><use href="#i-strike"/></svg></button>
        <span class="tb-sep"></span>
        <button type="button" class="tb" data-action="inline-code" title="Inline-Code (Strg+E) – oder `Text` tippen"><svg class="icon"><use href="#i-code"/></svg></button>
        <button type="button" class="tb" data-action="code-block" title="Code-Block – oder ``` tippen"><svg class="icon"><use href="#i-code-block"/></svg></button>
        <button type="button" class="tb" data-action="quote" title="Zitat – oder &gt; am Zeilenanfang tippen"><svg class="icon"><use href="#i-quote"/></svg></button>
        <span class="tb-sep"></span>
        <button type="button" class="tb" data-cmd="insertUnorderedList" title="Aufzählung – oder - am Zeilenanfang tippen"><svg class="icon"><use href="#i-list-ul"/></svg></button>
        <button type="button" class="tb" data-cmd="insertOrderedList" title="Nummerierte Liste – oder 1. am Zeilenanfang tippen"><svg class="icon"><use href="#i-list-ol"/></svg></button>
        <span class="tb-sep"></span>
        <button type="button" class="tb" data-action="link" title="Link einfügen (Strg+K)"><svg class="icon"><use href="#i-link"/></svg></button>
        <button type="button" class="tb" data-action="clear" title="Formatierung entfernen"><svg class="icon"><use href="#i-clear-format"/></svg></button>
        <span class="tb-hint">Shift+Enter = neue Zeile</span>
      </div>
      <div class="input-row">
        <label class="btn ghost icon-btn file-btn" title="Datei senden"><svg class="icon"><use href="#i-paperclip"/></svg><input id="file-input" type="file" multiple hidden></label>
        <div id="message-input" class="composer" contenteditable="true" data-placeholder="Nachricht oder Link …" spellcheck="true"></div>
        <button type="submit" class="btn primary send-btn"><svg class="icon"><use href="#i-send"/></svg><span class="send-label">Senden</span></button>
      </div>
    </form>
    <div class="drop-hint"><svg class="icon big"><use href="#i-download"/></svg>Datei hier ablegen</div>
  </main>

  <div id="toast" class="toast" hidden></div>

  <script src="lib/signalr.min.js"></script>
  <script src="lib/highlight.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
