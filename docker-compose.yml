services:
  share2forget:
    build: .
    image: share2forget
    container_name: share2forget
    restart: unless-stopped
    ports:
      # Host-Port beim Deploy anpassbar: PORT=9000 docker compose up -d
      # (oder PORT in einer .env-Datei setzen; Standard: 8080)
      - "${PORT:-8080}:8080"
    environment:
      # Maximale Dateigröße pro Upload in MB
      MAX_FILE_MB: "2048"
      # Inaktive, leere Channels nach dieser Zeit automatisch vergessen (0 = nie)
      CHANNEL_TTL_HOURS: "24"
